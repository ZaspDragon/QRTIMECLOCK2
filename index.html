<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#1f6fff" />
  <meta
    name="description"
    content="Portaly is a QR timeclock, approvals, payroll, and margin platform built for staffing agencies."
  />
  <title>Portaly | Staffing Agency Operating System</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="style.css" />
</head>
<body data-layout="public">
  <div id="app"></div>
  <div class="toast-root" id="toastRoot" aria-live="polite" aria-atomic="true"></div>

  <script src="firebase-config.js"></script>
  <script src="billing-config.js"></script>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-app.js";
    import {
      getAuth,
      setPersistence,
      browserLocalPersistence,
      onAuthStateChanged,
      signInWithEmailAndPassword,
      createUserWithEmailAndPassword,
      sendPasswordResetEmail,
      signOut
    } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-auth.js";
    import {
      getFirestore,
      collection,
      doc,
      setDoc,
      addDoc,
      getDoc,
      getDocs,
      updateDoc,
      deleteDoc,
      query,
      where,
      orderBy,
      limit,
      writeBatch,
      serverTimestamp
    } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-firestore.js";

    function createSnapshotAdapter(snapshot) {
      return {
        id: snapshot.id,
        exists: snapshot.exists(),
        data: () => snapshot.data(),
        ref: snapshot.ref
      };
    }

    function createQuerySnapshotAdapter(snapshot) {
      return {
        empty: snapshot.empty,
        size: snapshot.size,
        docs: snapshot.docs.map(createSnapshotAdapter)
      };
    }

    function applyQueryState(sourceRef, state) {
      let current = sourceRef;
      state.whereClauses.forEach(args => {
        current = query(current, where(...args));
      });
      state.orderClauses.forEach(args => {
        current = query(current, orderBy(...args));
      });
      if (state.limitValue !== null) {
        current = query(current, limit(state.limitValue));
      }
      return current;
    }

    function createDocumentRef(db, collectionName, id) {
      return {
        id,
        async get() {
          const snapshot = await getDoc(doc(db, collectionName, id));
          return createSnapshotAdapter(snapshot);
        },
        async set(data, options = {}) {
          await setDoc(doc(db, collectionName, id), data, options);
        },
        async update(data) {
          await updateDoc(doc(db, collectionName, id), data);
        },
        async delete() {
          await deleteDoc(doc(db, collectionName, id));
        }
      };
    }

    function createCollectionRef(db, collectionName, queryState = null) {
      const state = queryState || {
        whereClauses: [],
        orderClauses: [],
        limitValue: null
      };

      return {
        doc(id) {
          return createDocumentRef(db, collectionName, id);
        },
        where(field, operator, value) {
          return createCollectionRef(db, collectionName, {
            ...state,
            whereClauses: [...state.whereClauses, [field, operator, value]]
          });
        },
        orderBy(field, direction = "asc") {
          return createCollectionRef(db, collectionName, {
            ...state,
            orderClauses: [...state.orderClauses, [field, direction]]
          });
        },
        limit(value) {
          return createCollectionRef(db, collectionName, {
            ...state,
            limitValue: value
          });
        },
        async get() {
          const ref = applyQueryState(collection(db, collectionName), state);
          return createQuerySnapshotAdapter(await getDocs(ref));
        },
        async add(data) {
          const response = await addDoc(collection(db, collectionName), data);
          return { id: response.id };
        }
      };
    }

    function createBatchAdapter(db) {
      const batch = writeBatch(db);
      return {
        set(targetRef, data, options = {}) {
          batch.set(doc(db, targetRef.collectionName || targetRef._collectionName || targetRef.__collectionName || targetRef.path.split("/")[0], targetRef.id), data, options);
        },
        update(targetRef, data) {
          batch.update(doc(db, targetRef.collectionName || targetRef._collectionName || targetRef.__collectionName || targetRef.path.split("/")[0], targetRef.id), data);
        },
        delete(targetRef) {
          batch.delete(doc(db, targetRef.collectionName || targetRef._collectionName || targetRef.__collectionName || targetRef.path.split("/")[0], targetRef.id));
        },
        commit() {
          return batch.commit();
        }
      };
    }

    function attachCollectionName(target, collectionName) {
      target.collectionName = collectionName;
      target._collectionName = collectionName;
      target.__collectionName = collectionName;
      target.path = `${collectionName}/${target.id}`;
      return target;
    }

    try {
      const config = window.PORTALY_FIREBASE_CONFIG || {};
      const firebaseConfig = config.firebaseConfig || {
        apiKey: config.apiKey,
        authDomain: config.authDomain,
        projectId: config.projectId,
        storageBucket: config.storageBucket,
        messagingSenderId: config.messagingSenderId,
        appId: config.appId,
        measurementId: config.measurementId
      };

      if (!config.enabled) {
        window.PortalyFirebase = {
          ready: false,
          disabled: true,
          error: "",
          config
        };
        window.dispatchEvent(new Event("portaly-firebase-ready"));
      } else {
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        try {
          await setPersistence(auth, browserLocalPersistence);
        } catch (persistenceError) {
          console.warn("[Portaly] Firebase auth persistence fallback", persistenceError);
        }
        const db = getFirestore(app);
        let analytics = null;
        let getAnalytics = () => null;

        try {
          const analyticsModule = await import("https://www.gstatic.com/firebasejs/12.7.0/firebase-analytics.js");
          getAnalytics = analyticsModule.getAnalytics;
          analytics = getAnalytics(app);
        } catch (analyticsError) {
          console.warn("[Portaly] Firebase Analytics unavailable", analyticsError);
          analytics = null;
        }

        const authBridge = {
          raw: auth,
          onAuthStateChanged(callback) {
            return onAuthStateChanged(auth, callback);
          },
          signInWithEmailAndPassword(email, password) {
            return signInWithEmailAndPassword(auth, email, password);
          },
          createUserWithEmailAndPassword(email, password) {
            return createUserWithEmailAndPassword(auth, email, password);
          },
          sendPasswordResetEmail(email) {
            return sendPasswordResetEmail(auth, email);
          },
          signOut() {
            return signOut(auth);
          }
        };

        Object.defineProperty(authBridge, "currentUser", {
          get() {
            return auth.currentUser;
          }
        });

        const dbBridge = {
          raw: db,
          collection(collectionName) {
            const ref = createCollectionRef(db, collectionName);
            const originalDoc = ref.doc;
            ref.doc = id => attachCollectionName(originalDoc(id), collectionName);
            return ref;
          },
          batch() {
            return createBatchAdapter(db);
          }
        };

        window.PortalyFirebase = {
          ready: true,
          disabled: false,
          error: "",
          config,
          app,
          analytics,
          auth: authBridge,
          db: dbBridge,
          initializeApp,
          getAnalytics,
          getAuth,
          onAuthStateChanged,
          signInWithEmailAndPassword,
          createUserWithEmailAndPassword,
          sendPasswordResetEmail,
          signOut,
          getFirestore,
          collection,
          doc,
          setDoc,
          addDoc,
          getDoc,
          getDocs,
          updateDoc,
          deleteDoc,
          query,
          where,
          orderBy,
          serverTimestamp,
          waitForReady() {
            return Promise.resolve(window.PortalyFirebase);
          }
        };

        window.dispatchEvent(new Event("portaly-firebase-ready"));
      }
    } catch (error) {
      console.error(error);
      window.PortalyFirebase = {
        ready: false,
        disabled: false,
        error: error.message || "Firebase failed to initialize.",
        config: window.PORTALY_FIREBASE_CONFIG || {}
      };
      window.dispatchEvent(new Event("portaly-firebase-ready"));
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.4/build/qrcode.min.js"></script>
  <script src="app.js" defer></script>
</body>
</html>
